services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lensly
      POSTGRES_PASSWORD: lensly
      POSTGRES_DB: lensly
    volumes:
      - lensly_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - lensly_redis:/data

volumes:
  lensly_pg:
  lensly_redis:
